name: Release musl static

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - 'img/**'
      - 'man/**'
      - '.clang-format'
      - '.editorconfig'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (tag/branch/SHA) to build"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-musl-static:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            docker_platform: linux/amd64
          - arch: aarch64
            docker_platform: linux/arm64

    name: Build ${{ matrix.arch }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up QEMU
        if: matrix.arch != 'x86_64'
        uses: docker/setup-qemu-action@v4
        with:
          platforms: ${{ matrix.docker_platform }}

      - name: Build static musl binary
        run: |
          DOCKER_PLATFORM=${{ matrix.docker_platform }} \
          TURBOJPEG_MODE=on \
          WITH_VIDEO=1 \
          WITH_VIDEO_DEVICE=1 \
            ./scripts/build-musl-static.sh
          test -x build-musl-static/src/timg
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            VERSION_OUT="$(build-musl-static/src/timg --version)"
            echo "${VERSION_OUT}"
            echo "${VERSION_OUT}" | grep -q "Turbo JPEG"
            echo "${VERSION_OUT}" | grep -q "Video decoding"
          else
            file build-musl-static/src/timg
          fi

      - name: Set artifact names
        id: vars
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.ref }}" ]; then
              VERSION="${{ inputs.ref }}"
            else
              VERSION="$(git describe --tags --always)"
            fi
          fi
          VERSION="$(echo "${VERSION}" | sed 's#[^A-Za-z0-9._-]#-#g')"
          BASENAME="timg-${VERSION}-linux-${{ matrix.arch }}-musl-static"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "basename=${BASENAME}" >> "${GITHUB_OUTPUT}"

      - name: Install packaging dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y zip

      - name: Package artifacts
        run: |
          mkdir -p "dist/${{ steps.vars.outputs.basename }}"
          install -m 0755 build-musl-static/src/timg "dist/${{ steps.vars.outputs.basename }}/timg"
          tar -C dist -czf "${{ steps.vars.outputs.basename }}.tar.gz" "${{ steps.vars.outputs.basename }}"
          (
            cd dist
            zip -r "../${{ steps.vars.outputs.basename }}.zip" "${{ steps.vars.outputs.basename }}"
          )

      - name: Generate checksums
        run: |
          sha256sum \
            "${{ steps.vars.outputs.basename }}.tar.gz" \
            "${{ steps.vars.outputs.basename }}.zip" \
            > "${{ steps.vars.outputs.basename }}-SHA256SUMS"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.basename }}
          path: |
            ${{ steps.vars.outputs.basename }}.tar.gz
            ${{ steps.vars.outputs.basename }}.zip
            ${{ steps.vars.outputs.basename }}-SHA256SUMS

  release:
    needs: build-musl-static
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    name: Publish Release
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*-SHA256SUMS
